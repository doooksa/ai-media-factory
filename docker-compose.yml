version: '3.8'

services:
  # База данных
  db:
    image: postgres:15
    container_name: vibe_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=vibe_db
      - POSTGRES_USER=vibe_user
      - POSTGRES_PASSWORD=vibe_pass
    ports:
      - "5432:5432"

  # Бэкенд
  backend:
    build: ./backend
    container_name: vibe_backend
    restart: always
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  # Фронтенд
  frontend:
    build: ./frontend
    container_name: vibe_frontend
    restart: always
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    stdin_open: true
    tty: true
    depends_on:
      - backend

volumes:
  postgres_data: